    <script>
      const url = new URL(window.location.href)

      const course_ = url.searchParams.get('c');

      let csx = '';

      for (const c of courses) {
        csx += `<option value='${c.id}'>${c.label}</option>`
      }

      document.querySelector('#s-course').innerHTML = csx;

       if(course_) {
        document.querySelector('#s-course').value = course_;
      }

      document.querySelector("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        document.querySelector("#btn-submit").disabled = true;
        const form = new FormData(e.target);

        const nome = form.get("nome");
        const apelido = form.get("apelido");
        const bi = form.get("bi");
        const nuit = form.get("nuit");
        const valor = parseFloat(form.get("valor"));
        const tel = form.get("tel");
        const email = form.get("email");
        const desc = form.get("desc");

        const data = { nome, apelido, bi, nuit, valor, tel, email, desc };

        try {
          const res = await fetch(api_url + "/crediinvest/create", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              app: "crediinvest",
              // user: localStorage.getItem("user"),
            },
            body: JSON.stringify(data),
          });

          if (res.status === 200) {
            const data = await res.json();
            console.log(data);
            alert("Obrigado, entraremos em contacto.");
            e.target.reset();
            window.location.href =
              api_url + "/crediinvest/" + data.docName + ".pdf";
          }
        } catch (error) {
          console.log(error);
        }

        document.querySelector("#btn-submit").disabled = false;
      });
    </script>
